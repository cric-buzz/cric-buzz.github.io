<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream</title>
    <style>
        body {
            text-align: center;
            background: #000;
            color: #fff;
        }
        .iframe-container {
            width: 100%;
            max-width: 1200px;
            height: 600px;
            overflow: hidden;
            position: relative;
            margin: auto;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            margin: 20px auto;
            cursor: pointer;
            display: block;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Live Match Streaming</h2>

    <div class="iframe-container" id="iframeWrapper">
        <iframe id="myIframe" 
            src="https://tamashalive.github.io/a_sports_hd.html" 
            style="border:0px;" 
            name="myiFrame" 
            scrolling="no" 
            frameborder="1" 
            marginheight="0px" 
            marginwidth="0px" 
            allowfullscreen>
        </iframe>
    </div>

    <button onclick="openFullscreen()">Go Fullscreen</button>

    <script>
        function openFullscreen() {
            let wrapper = document.getElementById("iframeWrapper");
            if (wrapper.requestFullscreen) {
                wrapper.requestFullscreen();
            } else if (wrapper.mozRequestFullScreen) { // Firefox
                wrapper.mozRequestFullScreen();
            } else if (wrapper.webkitRequestFullscreen) { // Chrome, Safari, Opera
                wrapper.webkitRequestFullscreen();
            } else if (wrapper.msRequestFullscreen) { // IE/Edge
                wrapper.msRequestFullscreen();
            }
        }
    </script>

</body>
</html>
